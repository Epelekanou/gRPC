version: "3.9"

services:
  grader:
    build:
      context: .
      dockerfile: grader/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      COLLECTOR_ADDR: collector:50051
      API_BASE: http://api:8000
      READY_TIMEOUT_S: "25"
      STREAM_TIMEOUT_S: "10"
    depends_on:
      - redis
      - collector
      - api      