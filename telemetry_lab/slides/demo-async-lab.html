# 🎬 Live Demo: “Why Async Matters in Our Telemetry System”

---

# 🟢 Demo 1 — Blocking vs Async (5 minutes)

## Goal

Show students how blocking code freezes the system.

---

## Step 1 — Create `blocking_demo.py`

```python
import time

def sensor(name, interval):
    while True:
        print(f"{name} sending data...")
        time.sleep(interval)

def main():
    sensor("Sensor-A", 1)
    sensor("Sensor-B", 2)

if __name__ == "__main__":
    main()
```

---

## Run It

```bash
python blocking_demo.py
```

---

## Ask Students

What do you see?

They’ll observe:

* Only Sensor-A runs.
* Sensor-B never runs.

Explain:

* `time.sleep()` blocks.
* First function never returns.
* No concurrency.

---

# 🟢 Demo 2 — Async Fix (3 minutes)

Now create:

## `async_demo.py`

```python
import asyncio

async def sensor(name, interval):
    while True:
        print(f"{name} sending data...")
        await asyncio.sleep(interval)

async def main():
    task1 = asyncio.create_task(sensor("Sensor-A", 1))
    task2 = asyncio.create_task(sensor("Sensor-B", 2))
    await asyncio.gather(task1, task2)

asyncio.run(main())
```

---

## Run It

```bash
python async_demo.py
```

---

## What Happens?

Both sensors run concurrently.

Explain:

* `await asyncio.sleep()` yields control.
* Event loop switches tasks.
* No threads required.

---

# 🟢 Demo 3 — One Slow Sensor Does NOT Break System (3 minutes)

Modify:

```python
async def sensor(name, interval):
    while True:
        print(f"{name} sending data...")
        if name == "Sensor-A":
            await asyncio.sleep(5)  # slow
        else:
            await asyncio.sleep(1)
```

---

Run again.

---

## Explain

* Sensor-A is slow.
* Sensor-B continues normally.
* Async isolates waiting.

Relate directly to your lab:

> If one sensor stalls, collector still processes others.

# 🟢 Demo 4 — Streaming Mental Model (Telemetry Simulation)

Now simulate what your collector does.

```python
# stream_simulation.py
import asyncio
import random

async def sensor(sensor_id):
    seq = 0
    while True:
        seq += 1
        value = random.random()
        yield sensor_id, seq, value
        await asyncio.sleep(1)

async def collector():
    async def sensor_stream():
        async for item in sensor("T-01"):
            yield item

    async for data in sensor_stream():
        print("Collector received:", data)

asyncio.run(collector())
```

---

Explain:

* `async for` consumes streaming generator.
* Exactly how gRPC client-streaming works.

Relate to:

```python
async for measurement in request_iterator:
```

inside `PushMeasurements`.

# 🟢 Demo 5 — What Happens If You Forget `await` (Powerful Moment)

Modify async demo:

```python
async def sensor(name, interval):
    while True:
        print(f"{name} sending data...")
        asyncio.sleep(interval)  # missing await!
```

Run it.

---

## Result?

High CPU.
System behaves strangely.

Explain:

* `asyncio.sleep()` returns coroutine.
* Not awaited.
* No yielding happens.

Relate to lab:

If they forget:

```python
await stub.PushMeasurements(...)
```

It won’t work correctly.

# 🟢 Demo 6 — Simulating FastAPI Background Task

```python
import asyncio

async def stream_consumer():
    while True:
        print("Receiving aggregate update...")
        await asyncio.sleep(2)

async def main():
    asyncio.create_task(stream_consumer())
    print("Server started...")
    await asyncio.sleep(10)

asyncio.run(main())
```

Explain:

* `create_task()` runs background process.
* Exactly how FastAPI startup subscription works.
* Web server doesn’t block.

# 🎯 Key Talking Points During Demo

* Async is about waiting efficiently.
* Streaming RPC relies on async generators.
* Event loop scheduling replaces threads.
* One bad component should not freeze system.
* In distributed systems, blocking is dangerous.

# 🧠 Final Question to Students

> If one sensor blocks using time.sleep(), what happens to the whole system?

---

# Answer:
> If one sensor blocks using time.sleep(), what happens to the whole system?

Everything stalls.

That’s why async discipline matters.
