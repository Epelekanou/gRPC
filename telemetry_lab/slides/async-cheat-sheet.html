# ⚡ Async Python Cheat Sheet (Telemetry Lab Edition)

---
# Async Python - Telemetry Lab Edition
## Core Idea

Async programming lets many tasks run concurrently **without threads** by yielding control while waiting.

In this lab:

* Sensors stream data
* Collector handles multiple streams
* FastAPI broadcasts updates

All using async.

---

# 🧩 Basic Syntax

## Coroutine Definition

```python
async def my_function():
    await something()
```

* `async def` → coroutine function
* `await` → pause and yield control

---

## Running Async Code

```python
asyncio.run(main())
```

Starts the event loop.

---

# 🔁 Async Sleep (Correct Way)

✅ Correct:

```python
await asyncio.sleep(1)
```

❌ Wrong:

```python
time.sleep(1)
```

This blocks everything.

---

# 🔄 Async Generators (Streaming)

Used heavily in this lab.

## Producing stream:

```python
async def sensor():
    while True:
        yield measurement
        await asyncio.sleep(1)
```

## Consuming stream:

```python
async for m in sensor():
    process(m)
```

---

# 📡 Async gRPC Basics

## Always use async gRPC:

```python
grpc.aio.insecure_channel()
```

NOT:

```python
grpc.insecure_channel()
```

---

## Client Streaming Example

```python
async with grpc.aio.insecure_channel(addr) as channel:
    stub = IngestServiceStub(channel)
    await stub.PushMeasurements(generator())
```

---

## Server Streaming Example

```python
async for agg in stub.StreamAggregates(req):
    print(agg)
```

---

# 🌐 FastAPI Background Tasks

Used for aggregate subscription.

```python
@app.on_event("startup")
async def startup():
    asyncio.create_task(subscribe())
```

This prevents blocking the server.

---

# 🧠 Event Loop Mental Model

```
Event Loop
 ├── Sensor streams
 ├── gRPC streams
 ├── Redis updates
 └── WebSocket broadcasts
```

One loop, many tasks.

---

# ⚠️ Common Mistakes (THIS LAB)

## Forgetting `await`

Wrong:

```python
stub.PushMeasurements(gen())
```

Correct:

```python
await stub.PushMeasurements(gen())
```

---

## Mixing Sync and Async

Never:

* use blocking Redis inside tight loops
* call blocking functions in async tasks

---

## Using Normal `for` Instead of `async for`

Wrong:

```python
for agg in stream:
```

Correct:

```python
async for agg in stream:
```

---

# ⭐ Golden Rules

1. If it waits → use `await`.
2. If it streams → use `async for`.
3. Never block the event loop.
4. Always use `grpc.aio`.
5. Async tasks cooperate, not parallelize.

---

# 🧪 Debugging Async Issues

If system freezes:

* Check for `time.sleep()`
* Check missing `await`
* Check blocking calls
* Check wrong gRPC channel type

---

# 🚀 Remember

Async is not magic.

It simply allows:

> Many waiting tasks to share one thread efficiently.

This is perfect for:

* network streaming
* telemetry pipelines
* real-time dashboards

Exactly what you are building.
