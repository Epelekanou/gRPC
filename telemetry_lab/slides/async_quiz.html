# 🧠 Part 1 — Short Async Quiz (5 Questions)

## Question 1 — Blocking vs Async

Which statement is TRUE?

A. `time.sleep()` pauses only the current async task
B. `await asyncio.sleep()` blocks the entire program
C. `time.sleep()` blocks the event loop
D. Async code always runs in parallel threads

---


✅ **Correct Answer:** C
**Explanation:** `time.sleep()` blocks the thread running the event loop, freezing all async tasks.

---

## Question 2 — Missing `await`

What happens here?

```python
stub.PushMeasurements(gen())
```

A. The RPC runs normally
B. The coroutine executes in background automatically
C. Nothing happens until awaited
D. Python throws syntax error

---


✅ **Correct Answer:** C
**Explanation:** Async functions return coroutines. They must be awaited.

---

## Question 3 — Streaming RPC Consumption

Which is correct for consuming a gRPC stream?

A.

```python
for x in stub.StreamAggregates(req):
```

B.

```python
async for x in stub.StreamAggregates(req):
```

C.

```python
await for x in stub.StreamAggregates(req):
```

D.

```python
while stub.StreamAggregates(req):
```

---


✅ **Correct Answer:** B
**Explanation:** gRPC async streaming uses async iterators.

---

## Question 4 — Async Generators

What does this do?

```python
async def gen():
    yield 1
```

A. Normal generator
B. Async generator
C. Coroutine returning 1
D. Invalid syntax

---


✅ **Correct Answer:** B
**Explanation:** `async def` + `yield` → async generator.

---

## Question 5 — Event Loop Concurrency

Why do multiple sensors run concurrently without threads?

A. Python automatically parallelizes them
B. The OS schedules them separately
C. They yield control using `await`
D. gRPC creates threads automatically

---


✅ **Correct Answer:** C
**Explanation:** Async tasks cooperate via `await`.
