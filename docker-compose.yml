version: "3.9"

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  collector:
    build:
      context: .
      dockerfile: collector/Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    command: ["python", "-m", "collector.collector_server", "--port", "50051"]
    depends_on:
      - redis
    ports:
      - "50051:50051"

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      COLLECTOR_ADDR: collector:50051   # keep it single-upstream for the lab
    depends_on:
      - collector
      - redis
    ports:
      - "8000:8000"

  sensors:
    build:
      context: .
      dockerfile: sensor/Dockerfile
    environment:
      COLLECTOR_ADDRS: "collector:50051"
    depends_on:
      - collector
