syntax = "proto3";
package telemetry.v1;

// ------------------------------------
// Core data model
// ------------------------------------

message SensorMeta {
    string sensor_id = 1;
    string sensor_type = 2;
    string location = 3;
}

message Measurement {
    SensorMeta meta = 1;
    uint64 seq = 2;
    int64 ts_unix_ms = 3;
    double value = 4;
}

// ------------------------------------
// Aggregations
// ------------------------------------

message AggregateKey {
    string sensor_type = 1;
    string location = 2;
}

message Aggregate {
    AggregateKey key = 1;
    uint64 count = 2;
    double sum = 3;
    double min = 4;
    double max = 5;
    int64 updated_unix_ms = 6;
}

// ------------------------------------
// Services
// ------------------------------------

service IngestService {
    rpc PushMeasurements(stream Measurement) returns (IngestAck);
}
message IngestAck {
    uint64 received = 1;
}

service AggregateService {
    rpc StreamAggregates(StreamAggregatesRequest) returns (stream Aggregate);
}
message StreamAggregatesRequest {
    repeated AggregateKey keys = 1;
    bool send_initial_snapshot = 2;
    uint32 min_update_interval_ms = 3;
}

service QueryService {
    rpc GetSensorStats(GetSensorStatsRequest) returns (GetSensorStatsResponse);
}
message GetSensorStatsRequest {
    string sensor_id = 1;
}

message RecentValue {
    int64 ts_unix_ms = 1;
    double value = 2;
}

message GetSensorStatsResponse {
    SensorMeta meta = 1;
    uint64 count = 2;
    double sum = 3;
    double min = 4;
    double max = 5;
    int64 updated_unix_ms = 6;
    repeated RecentValue recent = 7;
}